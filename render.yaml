services:
  - type: web
    name: rag-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama3-8b-8192
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: rag-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port ${PORT:-8501} --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"